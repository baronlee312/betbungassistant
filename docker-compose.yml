version: '3.8'

services:
  postgres-local:
    image: postgres:15-alpine
    container_name: betbungassistant-db-local
    ports:
      - '5433:5432' # Maps container port 5432 to host port 5433 to avoid conflicts
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: betbungassistant
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
